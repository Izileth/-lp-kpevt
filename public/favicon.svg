<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circular Container (Xbox inspiration) -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGrad)"/>
  
  <!-- Deconstructed Geometric 'K' (Vercel inspiration for sharpness) -->
  <!-- Vertical Pillar -->
  <rect x="7" y="7" width="4.5" height="18" rx="0.5" fill="url(#kGrad)"/>
  
  <!-- Sharp Chevron/Arms (Separated to create a modern tech look) -->
  <path d="M14 16 L24.5 7 H30 L18.5 16 L30 25 H24.5 L14 16 Z" fill="url(#kGrad)"/>
  
  <!-- Subtle accent dot for 'Differential' look (Google-like detail) -->
  <circle cx="16" cy="16" r="1.5" fill="#000"/>
</svg>
